<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <rect width="600" height="160" fill="#faf8f3"/>
  <rect width="600" height="160" fill="none" stroke="#c8c4bc" stroke-width="1"/>

  <!-- Navigation diagram: site name + links -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" font-family="monospace" font-size="11" font-weight="bold" fill="#1a1a1a">actualfuckingwebsite.com</text>
    <line x1="0" y1="22" x2="520" y2="22" stroke="#ccc" stroke-width="1"/>

    <!-- Nav links -->
    <text x="0" y="44" font-family="monospace" font-size="11" fill="#1a1a1a">about</text>
    <line x1="0" y1="50" x2="30" y2="50" stroke="#1a1a1a" stroke-width="1"/>

    <text x="60" y="44" font-family="monospace" font-size="11" fill="#1a1a1a">blog</text>
    <line x1="60" y1="50" x2="85" y2="50" stroke="#1a1a1a" stroke-width="1"/>

    <text x="115" y="44" font-family="monospace" font-size="11" fill="#1a1a1a">now</text>
    <line x1="115" y1="50" x2="138" y2="50" stroke="#1a1a1a" stroke-width="1"/>

    <text x="168" y="44" font-family="monospace" font-size="11" fill="#1a1a1a">uses</text>
    <line x1="168" y1="50" x2="193" y2="50" stroke="#1a1a1a" stroke-width="1"/>

    <text x="223" y="44" font-family="monospace" font-size="11" fill="#1a1a1a">contact</text>
    <line x1="223" y1="50" x2="260" y2="50" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Annotation -->
    <text x="0" y="84" font-family="Georgia, serif" font-size="10" fill="#888">↑ ten lines of HTML. that is the whole navigation.</text>
    <text x="0" y="100" font-family="Georgia, serif" font-size="10" fill="#888">no state. no component. no hamburger. just links.</text>
  </g>
</svg>
