<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- Paper background -->
  <rect width="600" height="200" fill="#faf8f3"/>
  <rect width="600" height="200" fill="none" stroke="#c8c4bc" stroke-width="1"/>

  <!-- Left: old web stack of boxes -->
  <g transform="translate(40, 30)">
    <text x="60" y="16" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">before</text>
    <!-- Big single block -->
    <rect x="10" y="24" width="100" height="130" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="60" y="94" font-family="Georgia, serif" font-size="11" fill="#555" text-anchor="middle">one page.</text>
    <text x="60" y="110" font-family="Georgia, serif" font-size="11" fill="#555" text-anchor="middle">one shot.</text>
    <text x="60" y="126" font-family="Georgia, serif" font-size="11" fill="#999" text-anchor="middle">gone.</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(180, 95)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#bbb" stroke-width="1.5"/>
    <polygon points="40,0 33,-4 33,4" fill="#bbb"/>
  </g>

  <!-- Right: multi-page blocks -->
  <g transform="translate(250, 20)">
    <text x="140" y="16" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">after</text>
    <!-- Multiple small pages -->
    <rect x="10" y="24" width="70" height="45" fill="#fefcf7" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="45" y="50" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">/about</text>

    <rect x="95" y="24" width="70" height="45" fill="#fefcf7" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="130" y="50" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">/blog</text>

    <rect x="180" y="24" width="70" height="45" fill="#fefcf7" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="215" y="50" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">/now</text>

    <rect x="10" y="84" width="70" height="45" fill="#fefcf7" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="45" y="110" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">/uses</text>

    <rect x="95" y="84" width="70" height="45" fill="#fefcf7" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="130" y="110" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">/contact</text>

    <rect x="180" y="84" width="70" height="45" fill="#fefcf7" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="215" y="110" font-family="monospace" font-size="9" fill="#bbb" text-anchor="middle">+more</text>

    <text x="140" y="160" font-family="Georgia, serif" font-size="10" fill="#888" text-anchor="middle">somewhere to come back to.</text>
  </g>
</svg>
